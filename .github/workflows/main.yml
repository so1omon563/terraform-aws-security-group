name: Release

on:
  pull_request_target:
    branches:
      - main
    types:
      - closed

permissions:
  actions: read
  contents: write

jobs:
  release:
    if: github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Wait for earlier release runs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          while :; do
            earlier_runs="$(
              gh run list --workflow "${GITHUB_WORKFLOW}" --limit 100 \
                --json databaseId,status \
                --jq ".[] | select(.databaseId < ${GITHUB_RUN_ID} and (.status == \"queued\" or .status == \"in_progress\" or .status == \"waiting\" or .status == \"pending\" or .status == \"requested\")) | .databaseId"
            )"
            if [[ -z "${earlier_runs}" ]]; then
              break
            fi
            sleep 10
          done

      - name: Bump version and push tag
        id: version
        uses: so1omon563/custom-semver-bumper@v1
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch

      - name: Find previous release
        id: previous-release
        if: steps.version.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="$(gh release list --exclude-drafts --exclude-pre-releases --limit 1 --json tagName --jq '.[0].tagName // ""')"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Create GitHub release
        if: steps.version.outputs.should_release == 'true'
        uses: so1omon563/release-creator@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ steps.version.outputs.new_version }}
          from-tag: ${{ steps.previous-release.outputs.tag }}
          tag-prefix: v
